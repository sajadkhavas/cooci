name: Phase 18 End-to-End Acceptance

on:
  push:
    branches:
      - "agent/phase-18-*"
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: phase18-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SITE_URL: https://127.0.0.1:4443
  VITE_SITE_ORIGIN: https://127.0.0.1:4443
  VITE_USE_BACKEND: "true"
  VITE_API_BASE_URL: https://127.0.0.1:8443
  VITE_ALLOW_DEV_MOCKS: "false"
  VITE_E2E_ACCEPTANCE: "true"
  VITE_AUTH_MODE: disabled
  VITE_PAYMENT_MODE: disabled
  PHASE18_FRONTEND_URL: https://127.0.0.1:4443
  PHASE18_API_URL: https://127.0.0.1:8443
  APP_ENV: testing
  APP_DEBUG: "true"
  APP_URL: https://127.0.0.1:8443
  FRONTEND_URL: https://127.0.0.1:4443
  FRONTEND_URLS: https://127.0.0.1:4443
  SANCTUM_STATEFUL_DOMAINS: 127.0.0.1:4443,127.0.0.1:8443
  SESSION_DRIVER: file
  SESSION_DOMAIN: ""
  SESSION_SECURE_COOKIE: "true"
  SESSION_SAME_SITE: lax
  DB_CONNECTION: sqlite
  DB_DATABASE: database/database.sqlite
  CACHE_STORE: array
  QUEUE_CONNECTION: sync
  MAIL_MAILER: array
  SMS_PROVIDER: testing
  OTP_EXPOSE_TEST_CODE: "true"
  OTP_RETRY_AFTER_SECONDS: "0"
  CHECKOUT_ENABLED: "true"
  PAYMENT_ENABLED: "true"
  PAYMENT_PROVIDER: testing
  PAYMENT_CALLBACK_URL: https://127.0.0.1:4443/payment/callback
  ORDER_SMS_PROVIDER: disabled
  TELESCOPE_ENABLED: "false"
  PULSE_ENABLED: "false"

jobs:
  browser-acceptance:
    name: Desktop and mobile Chromium against Laravel production build
    runs-on: ubuntu-latest
    timeout-minutes: 34

    steps:
      - name: Checkout storefront
        uses: actions/checkout@v4

      - name: Checkout merged Phase 18 backend
        uses: actions/checkout@v4
        with:
          repository: sajadkhavas/winimi-bakery-backend
          ref: main
          path: backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, ctype, curl, dom, fileinfo, gd, intl, mbstring, openssl, pdo_sqlite, sqlite3, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Install and prepare Laravel
        working-directory: backend
        run: |
          composer install --prefer-dist --no-interaction --no-progress
          cp .env.example .env
          mkdir -p database storage/framework/sessions storage/framework/cache storage/framework/views
          touch database/database.sqlite
          php artisan key:generate --force
          php artisan optimize:clear
          php artisan migrate:fresh --force
          php artisan db:seed --class='Database\Seeders\WinimiStagingSeeder' --force
          php scripts/audit-phase-18-acceptance.php

      - name: Start Laravel API
        working-directory: backend
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 > ../backend-server.log 2>&1 &
          echo $! > ../backend-server.pid

      - name: Wait for Laravel readiness
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8000/api/system/ready > backend-ready.json; then
              cat backend-ready.json
              exit 0
            fi
            sleep 1
          done
          cat backend-server.log
          exit 1

      - name: Generate ephemeral loopback TLS certificate
        run: |
          mkdir -p .ci-tls
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout .ci-tls/loopback.key \
            -out .ci-tls/loopback.crt \
            -days 1 \
            -subj '/CN=127.0.0.1' \
            -addext 'subjectAltName=IP:127.0.0.1,DNS:localhost'

      - name: Start ephemeral HTTPS API proxy
        run: |
          HTTPS_PROXY_KEY=.ci-tls/loopback.key \
          HTTPS_PROXY_CERT=.ci-tls/loopback.crt \
          HTTPS_PROXY_PORT=8443 \
          HTTPS_PROXY_TARGET=http://127.0.0.1:8000 \
            node scripts/https-loopback-proxy.mjs > api-proxy.log 2>&1 &
          echo $! > api-proxy.pid

      - name: Wait for HTTPS API proxy
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --insecure https://127.0.0.1:8443/api/system/ready > api-proxy-ready.json; then
              cat api-proxy-ready.json
              exit 0
            fi
            sleep 1
          done
          cat api-proxy.log
          exit 1

      - name: Install storefront and pinned browser runner
        run: |
          npm ci
          npm install --no-save --no-package-lock @playwright/test@1.55.0
          npx playwright install --with-deps chromium

      - name: Validate real delivery-options contract
        run: |
          set +e
          DELIVERY_STATUS=$(curl --silent --show-error --get \
            --output delivery-options.json \
            --write-out '%{http_code}' \
            --header 'Accept: application/json' \
            http://127.0.0.1:8000/api/delivery/options \
            --data-urlencode 'province=تهران' \
            --data-urlencode 'city=تهران' \
            --data-urlencode 'subtotalToman=350000' \
            --data-urlencode 'requiresCooling=0')
          CURL_EXIT=$?
          set -e
          printf '%s\n' "$DELIVERY_STATUS" > delivery-status.txt
          echo "curl_exit=$CURL_EXIT http_status=$DELIVERY_STATUS"
          cat delivery-options.json || true
          if [ "$CURL_EXIT" -ne 0 ] || [ "$DELIVERY_STATUS" != "200" ]; then
            echo '--- Laravel exception log ---'
            tail -n 300 backend/storage/logs/laravel.log || true
            exit 1
          fi
          node --experimental-strip-types --experimental-loader ./tests/unit/alias-loader.mjs --input-type=module -e '
            import fs from "node:fs";
            import { backendDeliveryOptionsSchema } from "./src/lib/order-contract-schema.ts";
            const envelope = JSON.parse(fs.readFileSync("delivery-options.json", "utf8"));
            const parsed = backendDeliveryOptionsSchema.safeParse(envelope.data);
            if (!parsed.success) {
              console.error(JSON.stringify(parsed.error.issues, null, 2));
              process.exit(1);
            }
            console.log("Real delivery-options contract is valid.");
          '

      - name: Phase 18 frontend architecture audit
        run: npm run audit:acceptance

      - name: Build production storefront and generated PWA
        id: production_build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee production-build.log

      - name: Start internal production storefront preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > frontend-server.log 2>&1 &
          echo $! > frontend-server.pid

      - name: Wait for internal storefront preview
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:4173/products > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat frontend-server.log
          exit 1

      - name: Start ephemeral HTTPS storefront proxy
        run: |
          HTTPS_PROXY_KEY=.ci-tls/loopback.key \
          HTTPS_PROXY_CERT=.ci-tls/loopback.crt \
          HTTPS_PROXY_PORT=4443 \
          HTTPS_PROXY_TARGET=http://127.0.0.1:4173 \
            node scripts/https-loopback-proxy.mjs > frontend-https-proxy.log 2>&1 &
          echo $! > frontend-https-proxy.pid

      - name: Wait for HTTPS storefront
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --insecure https://127.0.0.1:4443/products > frontend-https-ready.html; then
              exit 0
            fi
            sleep 1
          done
          cat frontend-https-proxy.log
          exit 1

      - name: Run desktop and mobile Laravel acceptance
        id: browser_tests
        run: |
          set -o pipefail
          npm run test:e2e -- phase18.spec.mjs 2>&1 | tee phase18-browser.log

      - name: Run desktop, mobile and PWA acceptance — PWA segment
        id: pwa_tests
        run: |
          set -o pipefail
          npm run test:e2e -- phase7-pwa.spec.mjs 2>&1 | tee phase7-pwa.log

      - name: Upload compact browser logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase18-browser-logs
          path: |
            phase18-browser.log
            phase7-pwa.log
            production-build.log
            performance-report.json
            api-proxy.log
            api-proxy-ready.json
            frontend-https-proxy.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Phase 18 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase18-browser-acceptance
          path: |
            phase18-browser.log
            phase7-pwa.log
            production-build.log
            performance-report.json
            backend-ready.json
            api-proxy-ready.json
            delivery-status.txt
            delivery-options.json
            backend-server.log
            api-proxy.log
            backend/storage/logs/laravel.log
            frontend-server.log
            frontend-https-proxy.log
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: warn
          retention-days: 14
