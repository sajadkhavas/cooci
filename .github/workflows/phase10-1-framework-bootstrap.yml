name: Phase 10.1 Framework Bootstrap

on:
  push:
    branches:
      - agent/frontend-phase-10-1-ssr-foundation
    paths:
      - .github/workflows/phase10-1-framework-bootstrap.yml

permissions:
  contents: write

concurrency:
  group: phase10-1-framework-bootstrap
  cancel-in-progress: false

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SITE_URL: https://winimibakery.com
      VITE_SITE_ORIGIN: https://winimibakery.com
      VITE_USE_BACKEND: "true"
      VITE_API_BASE_URL: https://api.winimibakery.com
      VITE_ALLOW_DEV_MOCKS: "false"
      VITE_AUTH_MODE: disabled
      VITE_PAYMENT_MODE: disabled
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/frontend-phase-10-1-ssr-foundation
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Apply Framework Mode migration
        run: |
          node scripts/migrate-phase10-1-framework.mjs
          node scripts/migrate-phase10-1-build.mjs

      - name: Resolve exact dependency graph
        run: npm install --no-audit --no-fund

      - name: Generate framework types
        run: npx react-router typegen

      - name: Typecheck migrated application
        run: npm run typecheck

      - name: Build SSR, browser and PWA outputs
        run: npm run build

      - name: Run framework route audit
        run: npm run audit:frontend

      - name: Commit generated migration
        run: |
          rm -f scripts/migrate-phase10-1-framework.mjs
          rm -f scripts/migrate-phase10-1-build.mjs
          rm -f .github/workflows/phase10-1-framework-bootstrap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Frontend Phase 10.1: React Router Framework SSR foundation'
          git push origin HEAD:agent/frontend-phase-10-1-ssr-foundation
