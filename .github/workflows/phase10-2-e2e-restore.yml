name: Phase 10.2 E2E Restore

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase10-2-e2e-restore-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  restore:
    if: github.head_ref == 'agent/frontend-phase-10-2-unified-shop-categories' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/frontend-phase-10-2-unified-shop-categories
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm
      - name: Restore complete Phase 18 source
        run: node scripts/restore-phase10-2-e2e-tail.mjs
      - name: Install dependencies
        run: npm ci
      - name: Verify acceptance audit, lint and repository gate
        run: |
          npm run audit:acceptance
          npm run lint
          npm run check
      - name: Commit restored acceptance source
        run: |
          rm -f scripts/restore-phase10-2-e2e-tail.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add e2e/phase18.spec.mjs scripts/restore-phase10-2-e2e-tail.mjs
          git commit -m 'Restore complete Phase 18 unified-shop acceptance'
          git push origin HEAD:agent/frontend-phase-10-2-unified-shop-categories
