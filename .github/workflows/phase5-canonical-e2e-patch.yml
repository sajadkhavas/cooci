name: Phase 5 One-Shot Canonical E2E Patch

on:
  push:
    branches:
      - agent/frontend-full-audit-phase-5-content-seo-forms
    paths:
      - scripts/phase5-canonical-e2e-patch.py

permissions:
  contents: write

concurrency:
  group: phase5-canonical-e2e-patch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Phase 5 branch
        uses: actions/checkout@v4
        with:
          ref: agent/frontend-full-audit-phase-5-content-seo-forms
          fetch-depth: 0

      - name: Apply asserted patch
        run: python3 scripts/phase5-canonical-e2e-patch.py

      - name: Validate patch
        run: git diff --check

      - name: Commit E2E update
        run: |
          git config user.name "winimi-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add e2e/phase18.spec.mjs
          git diff --cached --quiet && { echo "No changes produced"; exit 1; }
          git commit -m "Phase 5: require one managed canonical per route"
          git push origin HEAD:agent/frontend-full-audit-phase-5-content-seo-forms
