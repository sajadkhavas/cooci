name: Phase 4 One-Shot E2E Submit Patch

on:
  push:
    branches:
      - agent/frontend-full-audit-phase-4-orders-payments
    paths:
      - scripts/phase4-e2e-submit-patch.py

permissions:
  contents: write

concurrency:
  group: phase4-e2e-submit-patch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Phase 4 branch
        uses: actions/checkout@v4
        with:
          ref: agent/frontend-full-audit-phase-4-orders-payments
          fetch-depth: 0

      - name: Apply asserted patch
        run: python3 scripts/phase4-e2e-submit-patch.py

      - name: Validate patch
        run: git diff --check

      - name: Commit E2E update
        run: |
          git config user.name "winimi-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add e2e/phase18.spec.mjs
          git diff --cached --quiet && { echo "No changes produced"; exit 1; }
          git commit -m "Phase 4: test server-confirmed checkout submission gate"
          git push origin HEAD:agent/frontend-full-audit-phase-4-orders-payments
