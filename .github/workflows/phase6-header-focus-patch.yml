name: Phase 6 One-Shot Header Focus Patch

on:
  push:
    branches:
      - agent/frontend-full-audit-phase-6-components-accessibility
    paths:
      - scripts/phase6-header-focus-patch.py

permissions:
  contents: write

concurrency:
  group: phase6-header-focus-patch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Phase 6 branch
        uses: actions/checkout@v4
        with:
          ref: agent/frontend-full-audit-phase-6-components-accessibility
          fetch-depth: 0

      - name: Apply asserted patch
        run: python3 scripts/phase6-header-focus-patch.py

      - name: Validate patch
        run: git diff --check

      - name: Commit Header update
        run: |
          git config user.name "winimi-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/components/layout/Header.tsx
          git diff --cached --quiet && { echo "No changes produced"; exit 1; }
          git commit -m "Phase 6: make Header route and focus behavior deterministic"
          git push origin HEAD:agent/frontend-full-audit-phase-6-components-accessibility
