name: Frontend CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SITE_URL: https://winimibakery.com
  VITE_SITE_ORIGIN: https://winimibakery.com
  VITE_USE_BACKEND: "false"
  VITE_API_BASE_URL: https://api.winimibakery.com
  VITE_AUTH_MODE: disabled
  VITE_PAYMENT_MODE: disabled

jobs:
  validate:
    name: Audit, accessibility, lint, typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate corrected lockfile
        if: github.event_name == 'push' && github.ref == 'refs/heads/feature/phase-7-responsive-accessibility'
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          if ! git diff --quiet -- package-lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "fix: synchronize dependency lockfile"
            git push origin HEAD:feature/phase-7-responsive-accessibility
          fi

      - name: Install dependencies
        id: install
        run: |
          set -o pipefail
          npm ci 2>&1 | tee npm-install.log

      - name: Upload install diagnostics
        if: failure() && steps.install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-install-diagnostics
          path: npm-install.log
          if-no-files-found: error
          retention-days: 3

      - name: Frontend route and content audit
        id: frontend_audit
        run: |
          set -o pipefail
          npm run audit:frontend 2>&1 | tee frontend-audit.log

      - name: Upload frontend audit diagnostics
        if: failure() && steps.frontend_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-diagnostics
          path: frontend-audit.log
          if-no-files-found: error
          retention-days: 3

      - name: Accessibility regression audit
        id: accessibility_audit
        run: |
          set -o pipefail
          npm run audit:accessibility 2>&1 | tee accessibility-audit.log

      - name: Upload accessibility diagnostics
        if: failure() && steps.accessibility_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-audit-diagnostics
          path: accessibility-audit.log
          if-no-files-found: error
          retention-days: 3

      - name: Lint
        run: npm run lint

      - name: Typecheck
        id: typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Production build
        run: npm run build
