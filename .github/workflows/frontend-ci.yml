name: Frontend CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "agent/**"
  pull_request:
    branches:
      - main

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SITE_URL: https://winimibakery.com
  VITE_SITE_ORIGIN: https://winimibakery.com
  VITE_USE_BACKEND: "true"
  VITE_API_BASE_URL: https://api.winimibakery.com
  VITE_ALLOW_DEV_MOCKS: "false"
  VITE_AUTH_MODE: disabled
  VITE_PAYMENT_MODE: disabled

jobs:
  phase6-header-patch:
    if: github.head_ref == 'agent/frontend-full-audit-phase-6-components-accessibility' || github.ref == 'refs/heads/agent/frontend-full-audit-phase-6-components-accessibility'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Phase 6 branch
        uses: actions/checkout@v4
        with:
          ref: agent/frontend-full-audit-phase-6-components-accessibility
          fetch-depth: 0

      - name: Apply asserted Header patch
        run: python3 scripts/phase6-header-focus-patch.py

      - name: Commit Header patch when needed
        run: |
          git diff --check
          if git diff --quiet -- src/components/layout/Header.tsx; then
            echo "Header patch already applied."
            exit 0
          fi
          git config user.name "winimi-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/components/layout/Header.tsx
          git commit -m "Phase 6: make Header route and focus behavior deterministic"
          git push origin HEAD:agent/frontend-full-audit-phase-6-components-accessibility

  validate:
    name: Audit transactions, content/SEO, auth, catalog/cart, UI, accessibility, tests, types and build
    runs-on: ubuntu-latest
    timeout-minutes: 26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full-launch roadmap audit
        run: npm run audit:launch

      - name: Phase 17 integration audit
        run: npm run audit:integration

      - name: Winimi pastel brand audit
        run: npm run audit:brand

      - name: Frontend full-audit Phase 1
        run: npm run audit:phase1

      - name: Frontend full-audit Phase 2
        run: npm run audit:phase2

      - name: Frontend full-audit Phase 3
        run: npm run audit:phase3

      - name: Frontend full-audit Phase 4
        run: npm run audit:phase4

      - name: Frontend full-audit Phase 5
        run: npm run audit:phase5

      - name: Upload full-audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-full-audit-diagnostics
          path: |
            frontend-phase1-audit.json
            frontend-phase2-audit.json
            frontend-phase3-audit.json
            frontend-phase4-audit.json
            frontend-phase5-audit.json
          if-no-files-found: warn
          retention-days: 14

      - name: Frontend route and content audit
        run: npm run audit:frontend

      - name: Accessibility regression audit
        run: npm run audit:accessibility

      - name: Content integrity audit
        run: npm run audit:content

      - name: Full modern UI audit
        run: npm run audit:modern-ui

      - name: Unit tests
        id: unit_tests
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee unit-tests.log

      - name: Upload unit-test diagnostics
        if: failure() && steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: unit-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Lint
        id: lint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      - name: Upload lint diagnostics
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: lint.log
          if-no-files-found: error
          retention-days: 3

      - name: Typecheck
        id: typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Production build and performance budget
        id: production_build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee production-build.log

      - name: Upload build diagnostics
        if: failure() && steps.production_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-build-diagnostics
          path: production-build.log
          if-no-files-found: error
          retention-days: 3

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-performance-report
          path: performance-report.json
          if-no-files-found: ignore
          retention-days: 14
