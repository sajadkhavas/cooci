name: Frontend CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "agent/**"
  pull_request:
    branches:
      - main

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SITE_URL: https://winimibakery.com
  VITE_SITE_ORIGIN: https://winimibakery.com
  VITE_USE_BACKEND: "true"
  VITE_API_BASE_URL: https://api.winimibakery.com
  VITE_ALLOW_DEV_MOCKS: "false"
  VITE_AUTH_MODE: disabled
  VITE_PAYMENT_MODE: disabled

jobs:
  phase10_1_bootstrap:
    if: github.actor != 'github-actions[bot]' && ((github.event_name == 'push' && github.ref == 'refs/heads/agent/frontend-phase-10-1-ssr-foundation') || (github.event_name == 'pull_request' && github.head_ref == 'agent/frontend-phase-10-1-ssr-foundation'))
    name: Migrate to React Router Framework Mode and SSR
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/frontend-phase-10-1-ssr-foundation
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22.22
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Apply source, build and audit migration
        run: |
          node scripts/migrate-phase10-1-framework.mjs
          node scripts/migrate-phase10-1-build.mjs

      - name: Resolve and lock exact dependency graph
        run: npm install --no-audit --no-fund

      - name: Generate Framework Mode route types
        run: npx react-router typegen

      - name: Typecheck migrated application
        run: npm run typecheck

      - name: Build SSR runtime, browser client and PWA
        run: npm run build

      - name: Verify framework route inventory
        run: npm run audit:frontend

      - name: Commit clean migration result
        run: |
          rm -f scripts/migrate-phase10-1-framework.mjs
          rm -f scripts/migrate-phase10-1-build.mjs
          rm -f .github/workflows/phase10-1-framework-bootstrap.yml
          git checkout origin/main -- .github/workflows/frontend-ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Frontend Phase 10.1: React Router Framework SSR foundation'
          git push origin HEAD:agent/frontend-phase-10-1-ssr-foundation

  validate:
    if: github.actor == 'github-actions[bot]' || (github.ref != 'refs/heads/agent/frontend-phase-10-1-ssr-foundation' && github.head_ref != 'agent/frontend-phase-10-1-ssr-foundation')
    name: Audit security, accessibility, runtime, build, PWA and deployment readiness
    runs-on: ubuntu-latest
    timeout-minutes: 36

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full-launch roadmap audit
        run: npm run audit:launch

      - name: Phase 17 integration audit
        run: npm run audit:integration

      - name: Winimi pastel brand audit
        run: npm run audit:brand

      - name: Frontend full-audit Phase 1
        run: npm run audit:phase1

      - name: Frontend full-audit Phase 2
        run: npm run audit:phase2

      - name: Frontend full-audit Phase 3
        run: npm run audit:phase3

      - name: Frontend full-audit Phase 4
        run: npm run audit:phase4

      - name: Frontend full-audit Phase 5
        run: npm run audit:phase5

      - name: Frontend full-audit Phase 6
        run: npm run audit:phase6

      - name: Frontend full-audit Phase 7
        run: npm run audit:phase7

      - name: Frontend full-audit Phase 8
        run: npm run audit:phase8

      - name: Frontend full-audit Phase 9
        run: npm run audit:phase9

      - name: Frontend runtime performance Phase 9.5
        run: npm run audit:runtime

      - name: Production environment schema audit
        run: npm run env:production:validate

      - name: Upload full-audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-full-audit-diagnostics
          path: |
            frontend-phase1-audit.json
            frontend-phase2-audit.json
            frontend-phase3-audit.json
            frontend-phase4-audit.json
            frontend-phase5-audit.json
            frontend-phase6-audit.json
            frontend-phase7-audit.json
            frontend-phase8-audit.json
            frontend-phase9-audit.json
            runtime-performance-audit.json
            production-env-audit.json
          if-no-files-found: warn
          retention-days: 14

      - name: Frontend route and content audit
        run: npm run audit:frontend

      - name: Accessibility regression audit
        run: npm run audit:accessibility

      - name: Content integrity audit
        run: npm run audit:content

      - name: Full modern UI audit
        run: npm run audit:modern-ui

      - name: Unit tests
        id: unit_tests
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee unit-tests.log

      - name: Upload unit-test diagnostics
        if: failure() && steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: unit-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Lint
        id: lint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      - name: Upload lint diagnostics
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: lint.log
          if-no-files-found: error
          retention-days: 3

      - name: Typecheck
        id: typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Production build and performance budget
        id: production_build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee production-build.log

      - name: Upload build diagnostics
        if: failure() && steps.production_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-build-diagnostics
          path: production-build.log
          if-no-files-found: error
          retention-days: 3

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-performance-report
          path: performance-report.json
          if-no-files-found: ignore
          retention-days: 14
