name: Frontend CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "agent/**"
  pull_request:
    branches:
      - main

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SITE_URL: https://winimibakery.com
  VITE_SITE_ORIGIN: https://winimibakery.com
  VITE_USE_BACKEND: "true"
  VITE_API_BASE_URL: https://api.winimibakery.com
  VITE_ALLOW_DEV_MOCKS: "false"
  VITE_AUTH_MODE: disabled
  VITE_PAYMENT_MODE: disabled

jobs:
  validate:
    name: Audit Phase 17 integration, UI, content, accessibility, types and build
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full-launch roadmap audit
        run: npm run audit:launch

      - name: Phase 17 integration audit
        run: npm run audit:integration

      - name: Frontend route and content audit
        run: npm run audit:frontend

      - name: Accessibility regression audit
        run: npm run audit:accessibility

      - name: Content integrity audit
        run: npm run audit:content

      - name: Full modern UI audit
        run: npm run audit:modern-ui

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Production build and performance budget
        run: npm run build

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-performance-report
          path: performance-report.json
          if-no-files-found: ignore
          retention-days: 14
