name: Phase 3 One-Shot Source Patch

on:
  push:
    branches:
      - agent/frontend-full-audit-phase-3-catalog-cart
    paths:
      - scripts/phase3-source-patch.py
      - scripts/phase3-source-patch-trigger.txt
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
    paths:
      - scripts/phase3-source-patch.py
      - scripts/phase3-source-patch-trigger.txt

permissions:
  contents: write

concurrency:
  group: phase3-source-patch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/frontend-full-audit-phase-3-catalog-cart
          fetch-depth: 0

      - name: Apply asserted source transformations
        id: patch
        run: |
          set +e
          python3 scripts/phase3-source-patch.py > phase3-source-patch.log 2>&1
          status=$?
          cat phase3-source-patch.log
          exit $status

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-source-patch-diagnostics
          path: phase3-source-patch.log
          if-no-files-found: error
          retention-days: 7

      - name: Validate patch whitespace
        run: git diff --check

      - name: Commit patched pages
        run: |
          git config user.name "winimi-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/pages/ProductDetailPage.tsx src/components/ProductCard.tsx src/pages/ProductsPage.tsx src/pages/CartPage.tsx
          git diff --cached --quiet && { echo "No changes produced"; exit 1; }
          git commit -m "Apply Phase 3 catalog and cart page fixes"
          git push origin HEAD:agent/frontend-full-audit-phase-3-catalog-cart
