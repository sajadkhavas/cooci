name: Phase 8 Deployment Readiness

on:
  push:
    branches:
      - main
      - "agent/frontend-full-audit-phase-8-*"
  pull_request:
    branches:
      - main

concurrency:
  group: phase8-deployment-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SITE_URL: https://winimibakery.com
  VITE_SITE_ORIGIN: https://winimibakery.com
  VITE_USE_BACKEND: "true"
  VITE_API_BASE_URL: https://api.winimibakery.com
  VITE_ALLOW_DEV_MOCKS: "false"
  VITE_AUTH_MODE: disabled
  VITE_PAYMENT_MODE: disabled

jobs:
  deployment-readiness:
    name: Reproducible release, Nginx, deploy and rollback
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and Nginx
        run: |
          npm ci
          sudo apt-get update -qq
          sudo apt-get install -y -qq nginx
          sudo systemctl stop nginx || true

      - name: Validate production environment and Phase 8 policy
        run: |
          npm run env:production:validate
          npm run audit:phase8

      - name: Build production storefront
        run: npm run build

      - name: Create and verify release A
        run: |
          npm run release:create -- dist "$RUNNER_TEMP/release-a"
          cp release-output.json release-a-output.json
          RELEASE_A_DIR=$(node -e 'const r=require("./release-a-output.json");process.stdout.write(r.releaseDir)')
          RELEASE_A_ID=$(node -e 'const fs=require("fs");const r=require("./release-a-output.json");process.stdout.write(JSON.parse(fs.readFileSync(`${r.releaseDir}/release-manifest.json`,"utf8")).releaseId)')
          npm run release:verify -- "$RELEASE_A_DIR"
          echo "RELEASE_A_DIR=$RELEASE_A_DIR" >> "$GITHUB_ENV"
          echo "RELEASE_A_ID=$RELEASE_A_ID" >> "$GITHUB_ENV"

      - name: Deploy release A
        run: |
          chmod +x deploy/bin/*.sh
          KEEP_RELEASES=5 deploy/bin/deploy-frontend.sh "$RELEASE_A_DIR" "$RUNNER_TEMP/winimi-frontend"
          test "$(cat "$RUNNER_TEMP/winimi-frontend/active-release")" = "$RELEASE_A_ID"
          npm run release:verify -- "$RUNNER_TEMP/winimi-frontend/current"

      - name: Create and verify release B
        run: |
          cp -a dist "$RUNNER_TEMP/dist-b"
          printf 'phase-8-rollback-probe\n' > "$RUNNER_TEMP/dist-b/release-probe.txt"
          npm run release:create -- "$RUNNER_TEMP/dist-b" "$RUNNER_TEMP/release-b"
          cp release-output.json release-b-output.json
          RELEASE_B_DIR=$(node -e 'const r=require("./release-b-output.json");process.stdout.write(r.releaseDir)')
          RELEASE_B_ID=$(node -e 'const fs=require("fs");const r=require("./release-b-output.json");process.stdout.write(JSON.parse(fs.readFileSync(`${r.releaseDir}/release-manifest.json`,"utf8")).releaseId)')
          npm run release:verify -- "$RELEASE_B_DIR"
          test "$RELEASE_B_ID" != "$RELEASE_A_ID"
          echo "RELEASE_B_DIR=$RELEASE_B_DIR" >> "$GITHUB_ENV"
          echo "RELEASE_B_ID=$RELEASE_B_ID" >> "$GITHUB_ENV"

      - name: Deploy release B
        run: |
          KEEP_RELEASES=5 deploy/bin/deploy-frontend.sh "$RELEASE_B_DIR" "$RUNNER_TEMP/winimi-frontend"
          test "$(cat "$RUNNER_TEMP/winimi-frontend/active-release")" = "$RELEASE_B_ID"
          test -f "$RUNNER_TEMP/winimi-frontend/current/dist/release-probe.txt"
          npm run release:verify -- "$RUNNER_TEMP/winimi-frontend/current"

      - name: Rollback to release A
        run: |
          deploy/bin/rollback-frontend.sh "$RUNNER_TEMP/winimi-frontend" "$RELEASE_A_ID"
          test "$(cat "$RUNNER_TEMP/winimi-frontend/active-release")" = "$RELEASE_A_ID"
          test ! -e "$RUNNER_TEMP/winimi-frontend/current/dist/release-probe.txt"
          npm run release:verify -- "$RUNNER_TEMP/winimi-frontend/current"

      - name: Generate ephemeral TLS certificate
        run: |
          mkdir -p "$RUNNER_TEMP/tls"
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout "$RUNNER_TEMP/tls/frontend.key" \
            -out "$RUNNER_TEMP/tls/frontend.crt" \
            -days 1 \
            -subj '/CN=127.0.0.1' \
            -addext 'subjectAltName=IP:127.0.0.1,DNS:localhost'

      - name: Render and validate production Nginx
        run: |
          FRONTEND_HTTP_PORT=8088 \
          FRONTEND_HTTPS_PORT=8448 \
          FRONTEND_HTTPS_REDIRECT_PORT=:8448 \
          FRONTEND_SERVER_NAMES='127.0.0.1 localhost' \
          FRONTEND_CANONICAL_HOST=127.0.0.1 \
          FRONTEND_DEPLOY_ROOT="$RUNNER_TEMP/winimi-frontend" \
          FRONTEND_ACME_ROOT="$RUNNER_TEMP/acme" \
          FRONTEND_TLS_CERTIFICATE="$RUNNER_TEMP/tls/frontend.crt" \
          FRONTEND_TLS_CERTIFICATE_KEY="$RUNNER_TEMP/tls/frontend.key" \
          FRONTEND_SECURITY_HEADERS_INCLUDE="$GITHUB_WORKSPACE/deploy/nginx/winimi-security-headers.conf" \
            npm run nginx:render -- deploy/nginx/winimi-frontend.conf.example "$RUNNER_TEMP/winimi-frontend.conf"
          mkdir -p "$RUNNER_TEMP/acme" "$RUNNER_TEMP/nginx"
          cat > "$RUNNER_TEMP/nginx/nginx.conf" <<EOF
          user $USER;
          worker_processes 1;
          pid $RUNNER_TEMP/nginx/nginx.pid;
          error_log $RUNNER_TEMP/nginx/error.log notice;
          events { worker_connections 256; }
          http {
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            access_log $RUNNER_TEMP/nginx/access.log;
            include $RUNNER_TEMP/winimi-frontend.conf;
          }
          EOF
          sudo nginx -t -c "$RUNNER_TEMP/nginx/nginx.conf"

      - name: Run HTTPS production smoke test
        run: |
          sudo nginx -c "$RUNNER_TEMP/nginx/nginx.conf"
          for attempt in {1..30}; do
            if curl --fail --silent --insecure https://127.0.0.1:8448/__frontend_health > frontend-health.json; then
              break
            fi
            sleep 1
          done
          SMOKE_INSECURE=true deploy/bin/smoke-test-frontend.sh https://127.0.0.1:8448
          sudo nginx -s quit -c "$RUNNER_TEMP/nginx/nginx.conf"

      - name: Upload Phase 8 deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase8-deployment-readiness
          path: |
            frontend-phase8-audit.json
            production-env-audit.json
            performance-report.json
            release-a-output.json
            release-b-output.json
            frontend-health.json
            ${{ runner.temp }}/winimi-frontend.conf
            ${{ runner.temp }}/nginx/error.log
            ${{ runner.temp }}/nginx/access.log
          if-no-files-found: warn
          retention-days: 14
