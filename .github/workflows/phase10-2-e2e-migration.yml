name: Phase 10.2 E2E Migration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase10-2-e2e-migration-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  migrate:
    if: github.head_ref == 'agent/frontend-phase-10-2-unified-shop-categories' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/frontend-phase-10-2-unified-shop-categories
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm
      - name: Patch the Phase 18 category journey
        run: node scripts/patch-phase10-2-phase18-e2e.mjs
      - name: Install dependencies
        run: npm ci
      - name: Verify lint and repository gate
        run: |
          npm run lint
          npm run check
      - name: Commit migrated E2E source
        run: |
          rm -f scripts/patch-phase10-2-phase18-e2e.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add e2e/phase18.spec.mjs scripts/patch-phase10-2-phase18-e2e.mjs
          git commit -m 'Test Phase 10.2 clean category route journeys'
          git push origin HEAD:agent/frontend-phase-10-2-unified-shop-categories
