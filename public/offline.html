<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#356f50" />
    <title>اتصال اینترنت در دسترس نیست | وینیمی</title>
    <style>
      :root { color-scheme: light; font-family: Tahoma, Arial, sans-serif; background: #f5fbf7; color: #173c2b; }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      main { width: min(100%, 620px); border: 1px solid #d6e5dc; border-radius: 24px; background: #fff; padding: clamp(24px, 6vw, 48px); box-shadow: 0 18px 60px rgba(23, 60, 43, .12); text-align: center; }
      .icon { width: 72px; height: 72px; margin: 0 auto 20px; display: grid; place-items: center; border-radius: 20px; background: #e7f2eb; font-size: 34px; }
      h1 { margin: 0 0 12px; font-size: clamp(24px, 5vw, 36px); }
      p { margin: 0 auto 24px; max-width: 500px; line-height: 2; color: #526a5d; }
      button, a { min-height: 48px; border-radius: 14px; padding: 12px 20px; font: inherit; font-weight: 700; cursor: pointer; text-decoration: none; }
      button { border: 0; background: #356f50; color: #fff; }
      a { display: inline-flex; align-items: center; justify-content: center; margin-right: 8px; border: 1px solid #bfd2c6; color: #356f50; background: #fff; }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">☁</div>
      <h1>اتصال اینترنت در دسترس نیست</h1>
      <p>
        بعضی صفحات و فایل‌های ذخیره‌شده ممکن است همچنان باز شوند، اما دریافت موجودی، ورود، ثبت سفارش و پرداخت به اتصال اینترنت نیاز دارند.
      </p>
      <button type="button" onclick="location.reload()">تلاش دوباره</button>
      <a href="/">بازگشت به خانه</a>
    </main>
  </body>
</html>
