<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#D0E596" />
    <title>اتصال اینترنت در دسترس نیست | وینیمی</title>
    <style>
      :root { color-scheme: light; font-family: Tahoma, Arial, sans-serif; background: #f8fbea; color: #27390c; }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top, rgba(208, 229, 150, .42), transparent 42rem), #f8fbea; }
      main { width: min(100%, 620px); border: 1px solid #d8e8ad; border-radius: 24px; background: rgba(255, 255, 255, .88); padding: clamp(24px, 6vw, 48px); box-shadow: 0 18px 60px rgba(39, 57, 12, .12); text-align: center; }
      .logo { width: 96px; height: 96px; margin: 0 auto 20px; display: block; border-radius: 999px; box-shadow: 0 16px 36px rgba(39, 57, 12, .18); }
      h1 { margin: 0 0 12px; font-size: clamp(24px, 5vw, 36px); }
      p { margin: 0 auto 24px; max-width: 500px; line-height: 2; color: #576539; }
      .actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
      a { display: inline-flex; min-height: 48px; align-items: center; justify-content: center; border-radius: 14px; padding: 12px 20px; border: 1px solid #b9ce7d; color: #27390c; background: #fff; font: inherit; font-weight: 700; cursor: pointer; text-decoration: none; }
      a.primary { border-color: #d0e596; background: #d0e596; }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="/brand/winimi-logo.svg" alt="لوگوی وینیمی بیکری" width="96" height="96" />
      <h1>اتصال اینترنت در دسترس نیست</h1>
      <p>
        بعضی صفحات و فایل‌های ذخیره‌شده ممکن است همچنان باز شوند، اما دریافت موجودی، ورود، ثبت سفارش و پرداخت به اتصال اینترنت نیاز دارند.
      </p>
      <div class="actions">
        <a class="primary" href="">تلاش دوباره</a>
        <a href="/">بازگشت به خانه</a>
      </div>
    </main>
  </body>
</html>
